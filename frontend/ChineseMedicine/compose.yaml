services:
  patient-frontend:
    build:
      context: ../..
      dockerfile: frontend/ChineseMedicine/Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:?请通过 .env 设置后端 API 地址}
    image: tcm-agent-patient-frontend:latest
    container_name: tcm-agent-patient-frontend
    restart: unless-stopped
    ports:
      - "${PATIENT_PORT:-8080}:8080"
