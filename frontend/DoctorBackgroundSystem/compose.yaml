services:
  doctor-frontend:
    build:
      context: ../..
      dockerfile: frontend/DoctorBackgroundSystem/Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:?请通过 .env 设置后端 API 地址}
    image: tcm-agent-doctor-frontend:latest
    container_name: tcm-agent-doctor-frontend
    restart: unless-stopped
    ports:
      - "${DOCTOR_PORT:-3000}:3000"
