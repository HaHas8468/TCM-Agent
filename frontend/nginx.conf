server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html/patient;
    index index.html;

    location = /healthz {
        access_log off;
        default_type application/json;
        return 200 '{"status":"ok","service":"patient-frontend"}';
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}

server {
    listen 3000;
    server_name _;
    root /usr/share/nginx/html/doctor;
    index index.html;

    location = /healthz {
        access_log off;
        default_type application/json;
        return 200 '{"status":"ok","service":"doctor-frontend"}';
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
