services:
  gateway:
    build:
      context: .
      dockerfile: Dockerfile
    env_file: .env
    depends_on:
      redis:
        condition: service_healthy
      agent:
        condition: service_healthy
      kg:
        condition: service_healthy
      mysql:
        condition: service_healthy
    expose: ["8000"]
    networks: [internal]

  agent:
    build:
      context: .
      dockerfile: agent_service/Dockerfile
    env_file: .env
    depends_on:
      redis:
        condition: service_healthy
      neo4j:
        condition: service_healthy
      kg:
        condition: service_healthy
    expose: ["8001"]
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import urllib.request; urllib.request.urlopen(\"http://localhost:8001/health\")'"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [internal]

  kg:
    build:
      context: .
      dockerfile: knowledge_graph_service/Dockerfile
    env_file: .env
    depends_on:
      neo4j:
        condition: service_healthy
    expose: ["3000"]
    healthcheck:
      test: ["CMD-SHELL", "node -e 'fetch(\"http://localhost:3000/health\").then((r) => { if (!r.ok) process.exit(1) }).catch(() => process.exit(1))'"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [internal]

  redis:
    image: redis:7.4-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes: ["redis-data:/data"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks: [internal]

  mysql:
    build:
      context: .
      dockerfile: docker/mysql/Dockerfile
    image: tcm-agent-mysql:local
    env_file: .env
    environment:
      MYSQL_DATABASE: ${MYSQL_DB}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -p$$MYSQL_ROOT_PASSWORD"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks: [internal]

  neo4j:
    image: neo4j:5-community
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD}
    volumes: ["neo4j-data:/data"]
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:7474 >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks: [internal]

  nginx:
    image: nginx:1.27-alpine
    ports: ["80:80"]
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on: [gateway]
    networks: [internal]

networks:
  internal:
    driver: bridge

volumes:
  redis-data:
  mysql-data:
  neo4j-data:
