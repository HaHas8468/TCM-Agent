<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>本草问方 - 中医药智能诊疗工作台登录</title>
    <style>
        /* 基础样式重置 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Noto Sans CJK SC", sans-serif;
        }

        /* 页面背景：采用温润的淡青色到白色的渐变，营造中医的草本治愈感与科技的纯净感 */
        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #E8F5E9 0%, #FFFFFF 100%);
            overflow: hidden;
            position: relative;
        }

        /* 装饰背景元素：用淡淡的圆形光晕填补四周，防止页面单调 */
        body::before {
            content: '';
            position: absolute;
            width: 400px;
            height: 400px;
            background: rgba(45, 106, 79, 0.05);
            border-radius: 50%;
            top: -100px;
            left: -100px;
            filter: blur(50px);
            z-index: 1;
        }

        /* 居中悬浮登录卡片 */
        .login-card {
            width: 420px;
            background: rgba(255, 255, 255, 0.85);
            padding: 40px 35px;
            border-radius: 20px;
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(20px); /* 现代毛玻璃效果 */
            z-index: 10;
            text-align: center;
            transition: all 0.3s ease;
        }

        .login-card:hover {
            box-shadow: 0 16px 48px rgba(45, 106, 79, 0.08);
            transform: translateY(-2px);
        }

        /* 头部标题区域 */
        .brand-header {
            margin-bottom: 35px;
        }

        /* 主标题：本草问方（古典粗体效果） */
        .main-title {
            font-size: 28px;
            font-weight: 700;
            color: #1B4332; /* 深草绿色 */
            letter-spacing: 4px; /* 拉开字间距显得高级 */
            margin-bottom: 8px;
        }

        /* 副标题：中医药智能诊疗工作台（现代细体效果） */
        .sub-title {
            font-size: 13px;
            font-weight: 400;
            color: #677A71;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        /* 表单区域 */
        .form-group {
            margin-bottom: 22px;
            text-align: left;
        }

        .form-label {
            display: block;
            font-size: 13px;
            color: #405148;
            margin-bottom: 8px;
            font-weight: 500;
            padding-left: 2px;
        }

        .input-control {
            width: 100%;
            height: 48px;
            padding: 0 16px;
            border-radius: 10px;
            border: 1px solid #D1DCD6;
            background-color: rgba(248, 250, 249, 0.8);
            font-size: 15px;
            color: #2D6A4F;
            outline: none;
            transition: all 0.2s ease;
        }

        /* 输入框聚焦时的高亮效果 */
        .input-control:focus {
            border-color: #2D6A4F;
            background-color: #FFFFFF;
            box-shadow: 0 0 0 3px rgba(45, 106, 79, 0.1);
        }

        /* 记住密码与忘记密码的辅助区域 */
        .form-actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            font-size: 13px;
        }

        .remember-me {
            display: flex;
            align-items: center;
            color: #677A71;
            cursor: pointer;
        }

        .remember-me input {
            margin-right: 6px;
            accent-color: #2D6A4F; /* 现代浏览器复选框变绿 */
        }

        .forgot-password {
            color: #2D6A4F;
            text-decoration: none;
            transition: color 0.2s;
        }

        .forgot-password:hover {
            color: #1B4332;
            text-decoration: underline;
        }

        /* 登录按钮 */
        .btn-submit {
            width: 100%;
            height: 48px;
            background-color: #2D6A4F; /* 艾绿色 */
            color: #FFFFFF;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            letter-spacing: 4px;
            cursor: pointer;
            box-shadow: 0 4px 12px rgba(45, 106, 79, 0.2);
            transition: all 0.2s ease;
        }

        .btn-submit:hover {
            background-color: #1B4332;
            box-shadow: 0 6px 16px rgba(27, 67, 50, 0.3);
        }

        .btn-submit:active {
            transform: scale(0.99);
        }

        /* 底部版权信息，淡化处理 */
        .footer-copyright {
            margin-top: 30px;
            font-size: 11px;
            color: #99A7A0;
            letter-spacing: 0.5px;
        }
    </style>
</head>
<body>

    <div class="login-card">
        <div class="brand-header">
            <h1 class="main-title">本草问方</h1>
            <p class="sub-title">中医药智能诊疗工作台</p>
        </div>

        <form id="loginForm" onsubmit="handleLogin(event)">
            <div class="form-group">
                <label class="form-label" for="username">医生账号</label>
                <input class="input-control" type="text" id="username" placeholder="请输入您的工号或邮箱" required autocomplete="username">
            </div>

            <div class="form-group">
                <label class="form-label" for="password">登录密码</label>
                <input class="input-control" type="password" id="password" placeholder="请输入密码" required autocomplete="current-password">
            </div>

            <div class="form-actions">
                <label class="remember-me">
                    <input type="checkbox" id="remember"> 记住账号
                </label>
                <a href="#" class="forgot-password">忘记密码？</a>
            </div>

            <button type="submit" class="btn-submit">登录</button>
        </form>

        <div class="footer-copyright">
            © 2026 本草问方 智能诊疗系统
        </div>
    </div>

    <script>
        // 前后端联通的演示脚本
        function handleLogin(event) {
            event.preventDefault(); // 阻止页面默认刷新
            
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            
            console.log("前端正在打包数据...");
            const requestData = {
                username: username,
                password: password // 实际开发中密码需要加密传输
            };
            console.log("准备发送给后端的 JSON 数据:", requestData);

            // 模拟登录成功后的交互逻辑
            const btn = document.querySelector('.btn-submit');
            btn.innerText = "登录中...";
            btn.disabled = true;

            setTimeout(() => {
                alert("登录联调演示成功！正在为您跳转至医生工作台...");
                btn.innerText = "登录";
                btn.disabled = false;
            }, 1000);
        }
    </script>
</body>
</html>
