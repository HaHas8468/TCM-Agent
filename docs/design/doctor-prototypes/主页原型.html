<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>本草问方 - 接诊队列</title>
    <style>
        /* --- 基础与变量 --- */
        :root {
            --primary-color: #2D6A4F; /* 艾绿 */
            --primary-dark: #1B4332;
            --primary-light: #E8F5E9;
            --bg-color: #F4F7F5; /* 极浅的灰绿色背景 */
            --text-main: #2C3E35;
            --text-sub: #677A71;
            --white: #FFFFFF;
            --border-color: #E0EAE4;
            --shadow-sm: 0 4px 12px rgba(45, 106, 79, 0.04);
            --shadow-md: 0 8px 24px rgba(45, 106, 79, 0.08);
            --radius-md: 12px;
            --radius-lg: 16px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; }

        body { background-color: var(--bg-color); color: var(--text-main); display: flex; height: 100vh; overflow: hidden; }

        /* --- 侧边栏 --- */
        .sidebar {
            width: 260px;
            background-color: var(--white);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            padding: 24px 16px;
            z-index: 10;
        }

        .brand {
            font-size: 20px;
            font-weight: 700;
            color: var(--primary-dark);
            letter-spacing: 2px;
            margin-bottom: 24px;
            padding: 0 8px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* 医生个人信息卡片 */
        .doctor-card {
            background: linear-gradient(135deg, var(--primary-color), var(--primary-dark));
            color: var(--white);
            border-radius: var(--radius-lg);
            padding: 20px;
            margin-bottom: 24px;
            box-shadow: var(--shadow-md);
        }

        .status-toggle {
            background: rgba(255, 255, 255, 0.2);
            border-radius: 20px;
            display: flex;
            padding: 4px;
            margin-bottom: 16px;
        }

        .status-toggle span {
            flex: 1;
            text-align: center;
            font-size: 13px;
            padding: 6px 0;
            border-radius: 16px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .status-toggle span.active { background: var(--white); color: var(--primary-color); font-weight: 600; }

        .doc-name { font-size: 18px; font-weight: 600; margin-bottom: 4px; }
        .doc-title { font-size: 12px; opacity: 0.8; margin-bottom: 12px; }
        .doc-info { font-size: 11px; opacity: 0.7; line-height: 1.6; }

        /* 导航菜单 */
        .nav-menu { list-style: none; flex: 1; }
        .nav-item {
            padding: 12px 16px;
            margin-bottom: 8px;
            border-radius: var(--radius-md);
            color: var(--text-sub);
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .nav-item:hover { background-color: #F0F5F2; color: var(--primary-color); }
        .nav-item.active { background-color: var(--primary-light); color: var(--primary-color); font-weight: 600; }

        /* --- 主内容区 --- */
        .main-content {
            flex: 1;
            padding: 32px 40px;
            overflow-y: auto;
        }

        .page-title { font-size: 24px; color: var(--primary-dark); font-weight: 600; margin-bottom: 24px; }

        /* 顶部统计卡片 */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-bottom: 24px;
        }

        .stat-card {
            background: var(--white);
            border-radius: var(--radius-lg);
            padding: 24px;
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--border-color);
            transition: transform 0.2s;
        }
        .stat-card:hover { transform: translateY(-2px); box-shadow: var(--shadow-md); }
        .stat-title { font-size: 13px; color: var(--text-sub); margin-bottom: 8px; }
        .stat-value { font-size: 32px; font-weight: 700; color: var(--primary-color); }

        /* 数据表格区域 */
        .table-container {
            background: var(--white);
            border-radius: var(--radius-lg);
            padding: 24px;
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--border-color);
        }

        .table-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .table-title { font-size: 16px; font-weight: 600; color: var(--primary-dark); }
        
        .filters select {
            padding: 8px 12px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            color: var(--text-sub);
            font-size: 13px;
            outline: none;
            margin-left: 12px;
            background-color: var(--bg-color);
        }

        /* 表格样式 */
        table { width: 100%; border-collapse: collapse; }
        th {
            text-align: left;
            padding: 12px 16px;
            font-size: 13px;
            color: var(--text-sub);
            font-weight: 500;
            border-bottom: 1px solid var(--border-color);
        }
        td {
            padding: 16px;
            font-size: 14px;
            border-bottom: 1px solid #F0F5F2;
            vertical-align: middle;
        }
        tr:hover td { background-color: #FAFCFB; }

        .patient-name { font-weight: 600; color: var(--primary-dark); margin-bottom: 4px; display: block; }
        .patient-meta { font-size: 12px; color: var(--text-sub); }

        /* 状态标签 */
        .badge {
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 500;
        }
        .badge.active { background-color: #E3F2FD; color: #1976D2; } /* 问诊中 - 柔和蓝 */
        .badge.waiting { background-color: #FFF3E0; color: #F57C00; } /* 待接诊 - 柔和橙 */
        .badge.finished { background-color: var(--primary-light); color: var(--primary-color); } /* 已结束 - 艾绿 */

        /* 操作按钮 */
        .btn-action {
            background-color: var(--primary-color);
            color: var(--white);
            border: none;
            padding: 8px 20px;
            border-radius: 8px;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-action:hover { background-color: var(--primary-dark); }
        
        /* 针对已结束的置灰按钮 */
        .btn-action.disabled { background-color: #E0EAE4; color: #99A7A0; cursor: not-allowed; }

    </style>
</head>
<body>

    <aside class="sidebar">
        <div class="brand">
            本草问方
        </div>

        <div class="doctor-card">
            <div class="status-toggle">
                <span class="active">值班</span>
                <span>休息</span>
            </div>
            <div class="doc-name">林知夏</div>
            <div class="doc-title">中医内科主任医师 · 管理员</div>
            <div class="doc-info">
                青囊中医院智慧门诊<br>
                周一门诊 08:00 - 17:00<br>
                脾胃病、肺系病、亚健康调理
            </div>
        </div>

        <ul class="nav-menu">
            <li class="nav-item active">接诊队列</li>
            <li class="nav-item">问诊工作台</li>
            <li class="nav-item">病历管理</li>
            <li class="nav-item">个人医案库</li>
            <li class="nav-item">系统统计</li>
            <li class="nav-item">用户设置</li>
            <li class="nav-item">用户管理</li>
        </ul>
    </aside>

    <main class="main-content">
        <h1 class="page-title">接诊队列</h1>

        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-title">今日挂号</div>
                <div class="stat-value">4</div>
            </div>
            <div class="stat-card">
                <div class="stat-title">待接诊</div>
                <div class="stat-value">2</div>
            </div>
            <div class="stat-card">
                <div class="stat-title">问诊中</div>
                <div class="stat-value">1</div>
            </div>
            <div class="stat-card">
                <div class="stat-title">已归档</div>
                <div class="stat-value">1</div>
            </div>
        </div>

        <div class="table-container">
            <div class="table-header">
                <div class="table-title">今日接诊队列</div>
                <div class="filters">
                    <select>
                        <option>全部科室</option>
                        <option>脾胃病科</option>
                        <option>肺病科</option>
                        <option>妇科</option>
                    </select>
                    <select>
                        <option>今日全部时段</option>
                        <option>上午</option>
                        <option>下午</option>
                    </select>
                </div>
            </div>

            <table>
                <thead>
                    <tr>
                        <th>患者</th>
                        <th>科室</th>
                        <th>挂号时间</th>
                        <th>状态</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td>
                            <span class="patient-name">王素梅</span>
                            <span class="patient-meta">女 · 45
